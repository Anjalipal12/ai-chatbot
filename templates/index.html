<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">AI Chatbot</span>
        </div>
        <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
      </div>

      <div class="model-selector">
        <label>Model</label>
        <select id="modelSelect">
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo (Fast)</option>
          <option value="gpt-4">GPT-4 (Powerful)</option>
          <option value="gpt-4-turbo-preview">GPT-4 Turbo (Latest)</option>
        </select>
      </div>

      <div class="stream-toggle">
        <label class="toggle-label">
          <input type="checkbox" id="streamToggle" checked />
          <span class="toggle-slider"></span>
          Streaming mode
        </label>
      </div>

      <div class="sidebar-footer">
        <div class="token-counter">
          <span class="token-icon">◈</span>
          Tokens used: <strong id="tokenCount">0</strong>
        </div>
        <div class="status-dot" id="statusDot" title="API Status"></div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <div class="chat-header">
        <h1>Chat with AI</h1>
        <span class="model-badge" id="activeBadge">GPT-3.5 Turbo</span>
      </div>

      <div class="messages-container" id="messagesContainer">
        <!-- Welcome screen -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-icon">✦</div>
          <h2>How can I help you today?</h2>
          <p>Ask me anything — code, concepts, creative writing, analysis.</p>
          <div class="suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion('Explain how FastAPI works with a simple example')">
              Explain FastAPI with an example
            </button>
            <button class="suggestion-chip" onclick="sendSuggestion('What is prompt engineering and how do I get better at it?')">
              What is prompt engineering?
            </button>
            <button class="suggestion-chip" onclick="sendSuggestion('Write a Python function to call the OpenAI API')">
              Write an OpenAI API function
            </button>
            <button class="suggestion-chip" onclick="sendSuggestion('What skills do I need to become a Full Stack AI Engineer?')">
              Skills for Full Stack AI Engineer
            </button>
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Message AI..."
            rows="1"
            onkeydown="handleKeydown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
      </div>
    </main>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
